[workspace]

[package]
name = "vara-ibc"
version = "0.1.0"
edition = "2021"

[dependencies]
sails-rs = "0.3.0"
gstd = "*"
codec = { package = "parity-scale-codec", version = "3.6", default-features = false }
scale-info = { version = "2.11", default-features = false, features = [
	"derive",
] }
libsecp256k1 = { version = "0.7", default-features = false, features = [
	"static-context",
] }
blake2b_simd = { version = "1.0.2", default-features = false }

[build-dependencies]
sails-rs = { version = "0.3.0", features = ["wasm-builder"] }

[dev-dependencies]
vara-ibc = { path = ".", features = ["wasm-binary"] }
vara-ibc-client = { path = "client" }
tokio = { version = "1.39", features = ["rt", "macros"] }

[features]
wasm-binary = []
